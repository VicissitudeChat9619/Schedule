server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://your-server-ip:3306/schedule?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
    username: root
    password: your-password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: myschedule_jwt_secret_key_2024_schedule_todo_reminder_system
  expiration: 604800000

napcat:
  api-url: http://localhost:3000
  timeout: 10000

reminder:
  cron: "0 * * * * *"
